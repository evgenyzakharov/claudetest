<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
    }

    .display .expression {
      color: #a0aec0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      padding: 18px 0;
      transition: transform 0.1s, opacity 0.1s;
    }

    button:active {
      transform: scale(0.93);
      opacity: 0.8;
    }

    .btn-number {
      background: #1a1a3e;
      color: #e2e8f0;
    }

    .btn-number:hover { background: #252550; }

    .btn-operator {
      background: #533483;
      color: #e2e8f0;
    }

    .btn-operator:hover { background: #6b44a8; }

    .btn-equals {
      background: #e94560;
      color: #fff;
      grid-column: span 2;
    }

    .btn-equals:hover { background: #ff5c7a; }

    .btn-clear {
      background: #e94560;
      color: #fff;
    }

    .btn-clear:hover { background: #ff5c7a; }

    .btn-special {
      background: #0f3460;
      color: #a0aec0;
    }

    .btn-special:hover { background: #1a4a80; }

    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-special" onclick="toggleSign()">+/-</button>
      <button class="btn-special" onclick="percent()">%</button>
      <button class="btn-operator" onclick="setOperator('/')">÷</button>

      <button class="btn-number" onclick="input('7')">7</button>
      <button class="btn-number" onclick="input('8')">8</button>
      <button class="btn-number" onclick="input('9')">9</button>
      <button class="btn-operator" onclick="setOperator('*')">×</button>

      <button class="btn-number" onclick="input('4')">4</button>
      <button class="btn-number" onclick="input('5')">5</button>
      <button class="btn-number" onclick="input('6')">6</button>
      <button class="btn-operator" onclick="setOperator('-')">−</button>

      <button class="btn-number" onclick="input('1')">1</button>
      <button class="btn-number" onclick="input('2')">2</button>
      <button class="btn-number" onclick="input('3')">3</button>
      <button class="btn-operator" onclick="setOperator('+')">+</button>

      <button class="btn-number btn-zero" onclick="input('0')">0</button>
      <button class="btn-number" onclick="inputDot()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = null;
    let operator = null;
    let resetNext = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = current;
    }

    function input(digit) {
      if (resetNext) {
        current = digit;
        resetNext = false;
      } else {
        current = current === '0' ? digit : current + digit;
      }
      if (current.length > 12) current = current.slice(0, 12);
      updateDisplay();
    }

    function inputDot() {
      if (resetNext) { current = '0.'; resetNext = false; return updateDisplay(); }
      if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function setOperator(op) {
      if (operator && !resetNext) calculate(true);
      previous = parseFloat(current);
      operator = op;
      resetNext = true;
      const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      expressionEl.textContent = `${previous} ${symbols[op]}`;
    }

    function calculate(chain = false) {
      if (operator === null || previous === null) return;
      const a = previous;
      const b = parseFloat(current);
      const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      if (!chain) expressionEl.textContent = `${a} ${symbols[operator]} ${b} =`;
      let result;
      switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/': result = b === 0 ? 'Ошибка' : a / b; break;
      }
      current = result === 'Ошибка' ? 'Ошибка' : parseFloat(result.toFixed(10)).toString();
      operator = null;
      previous = null;
      resetNext = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = null;
      operator = null;
      resetNext = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      current = (parseFloat(current) * -1).toString();
      updateDisplay();
    }

    function percent() {
      current = (parseFloat(current) / 100).toString();
      updateDisplay();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') input(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('-');
      else if (e.key === '*') setOperator('*');
      else if (e.key === '/') { e.preventDefault(); setOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        current = current.length > 1 ? current.slice(0, -1) : '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
